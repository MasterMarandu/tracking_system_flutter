name: tracking_system_app
description: "Routio — App del conductor (logística y tracking GPS)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.2.0
  
  # Dependency Injection
  get_it: ^8.0.2
  
  # Supabase
  supabase_flutter: ^2.5.6
  
  # Local Database
  path_provider: ^2.1.3
  
  # Network
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  
  # Location & Maps
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.7.0
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Background Services
  flutter_background_service: ^5.0.5
  
  # Notifications
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.1
  
  # Camera & Scanner
  camera: ^0.11.0+1
  mobile_scanner: ^5.1.1
  image_picker: ^1.1.2
  image: ^4.2.0
  
  # Storage
  flutter_secure_storage: ^9.2.2
  
  # Utils
  intl: ^0.19.0
  logger: ^2.4.0
  uuid: ^4.4.0
  url_launcher: ^6.2.6
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  
  # Signature
  signature: ^5.5.0
  
  # JSON
  json_annotation: ^4.9.0
  
  # Freezed
  freezed_annotation: ^2.4.1
  
  # Firebase Core
  firebase_core: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  
  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
